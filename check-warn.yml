name: Check CA WARN Report

on:
  schedule:
    # Runs Tuesday and Thursday at 10:00 AM Pacific (18:00 UTC)
    - cron: '0 18 * * 2'  # Tuesday
    - cron: '0 18 * * 4'  # Thursday
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

jobs:
  check-warn:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Needed to commit data/ updates
      issues: write        # Needed to process subscription issues

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl resend

      - name: Download and cache WARN XLSX for website search
        run: |
          curl -L -o data/warn_report.xlsx \
            "https://edd.ca.gov/siteassets/files/jobs_and_training/warn/warn_report1.xlsx"
          echo "Cached WARN XLSX ($(du -h data/warn_report.xlsx | cut -f1))"

      - name: Process pending subscriptions (from GitHub Issues)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: python scripts/process_subscriptions.py

      - name: Check WARN report and send alerts
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: python scripts/check_warn.py

      - name: Commit all data changes (XLSX cache, subscribers, hash)
        run: |
          git config user.name  "WARN Bot"
          git config user.email "warn-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update WARN cache and subscriber data [skip ci]"
          git push
