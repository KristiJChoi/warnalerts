name: Check CA WARN Report

on:
  schedule:
    - cron: '0 18 * * 2'  # Tuesday
    - cron: '0 18 * * 4'  # Thursday
  workflow_dispatch:

jobs:
  check-warn:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

