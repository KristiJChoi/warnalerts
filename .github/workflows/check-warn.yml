name: Check CA WARN Report

on:
  schedule:
    - cron: '0 18 * * 2'  # Tuesday
    - cron: '0 18 * * 4'  # Thursday
  workflow_dispatch:

jobs:
  check-warn:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl resend

      - name: Download and cache WARN XLSX for website search
        run: |
          mkdir -p data
          python3 -c "
          import requests
          url = 'https://edd.ca.gov/siteassets/files/jobs_and_training/warn/warn_report1.xlsx'
          headers = {'User-Agent': 'Mozilla/5.0 CA-WARN-Tracker/1.0'}
          r = requests.get(url, headers=headers, timeout=30)
          r.raise_for_status()
          with open('data/warn_report.xlsx', 'wb') as f:
              f.write(r.content)
          print(f'Downloaded {len(r.content)//1024}KB')
          "

      - name: Process pending subscriptions (from GitHub Issues)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: python scripts/process_subscriptions.py

      - name: Check WARN report and send alerts
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: python scripts/check_warn.py

      - name: Commit all data changes
        run: |
          git config user.name  "WARN Bot"
          git config user.email "warn-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update WARN cache and subscriber data [skip ci]"
          git push
